<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Window Model Context Export</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="field-group">
    <div class="field-label-row">
      <label>Bugzilla URLs</label>
      <button type="button" id="bug-add-btn" class="icon-btn">+</button>
    </div>
    <div id="bug-urls-container">
      <div class="bug-row">
        <input type="text" class="bug-input" placeholder="https://bugzilla.mozilla.org/show_bug.cgi?id=…" />
        <button type="button" class="remove-btn icon-btn">×</button>
      </div>
    </div>
  </div>

  <div class="field-group">
    <label>Browsing History</label>
    <select id="history-preset">
      <option value="">None</option>
      <option value="1h">Last 1 hour</option>
      <option value="4h">Last 4 hours</option>
      <option value="24h">Last 24 hours</option>
      <option value="3d">Last 3 days</option>
      <option value="7d">Last 7 days</option>
      <option value="30d">Last 30 days</option>
      <option value="custom">Custom range…</option>
    </select>
    <div class="date-row hidden" id="custom-date-row">
      <input type="text" id="start-date" placeholder="YYYY-MM-DD HH:MM" />
      <span class="date-sep">–</span>
      <input type="text" id="end-date" placeholder="YYYY-MM-DD HH:MM (optional)" />
    </div>
    <div class="date-error-msg hidden" id="date-error-msg">Use format YYYY-MM-DD HH:MM</div>
  </div>

  <div class="field-group">
    <label for="notes">Notes</label>
    <textarea id="notes" rows="5" placeholder="Add any notes about this export…"></textarea>
  </div>

  <button id="export-btn">Export to File…</button>
  <div id="status" class="status hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
